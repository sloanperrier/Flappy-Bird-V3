<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAPPY NEO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00f5ff;
    --magenta: #ff006e;
    --yellow: #ffdd00;
    --dark: #020818;
    --mid: #060d2e;
    --grid: rgba(0,245,255,0.07);
  }

  body {
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
  }

  #game-wrapper {
    position: relative;
    width: 400px;
    height: 600px;
  }

  canvas {
    display: block;
    border: 1px solid var(--cyan);
    box-shadow: 0 0 30px rgba(0,245,255,0.3), 0 0 80px rgba(0,245,255,0.1), inset 0 0 30px rgba(0,0,0,0.8);
    border-radius: 4px;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #score-display {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', monospace;
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 10px var(--cyan), 0 0 30px var(--cyan);
    letter-spacing: 4px;
  }

  #hi-display {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(0,245,255,0.5);
    letter-spacing: 3px;
    white-space: nowrap;
  }

  /* Difficulty indicator */
  #diff-display {
    position: absolute;
    top: 82px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    white-space: nowrap;
    transition: color 0.5s;
  }

  #screen {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(2,8,24,0.88);
    backdrop-filter: blur(2px);
    pointer-events: all;
    transition: opacity 0.3s;
  }

  #screen.hidden { opacity: 0; pointer-events: none; }

  .screen-title {
    font-family: 'Orbitron', monospace;
    font-size: 40px;
    font-weight: 900;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan), 0 0 60px rgba(0,245,255,0.4);
    letter-spacing: 6px;
    line-height: 1;
  }

  .screen-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(0,245,255,0.4);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .screen-score {
    font-family: 'Orbitron', monospace;
    font-size: 64px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px var(--cyan);
    margin: 8px 0;
  }

  .screen-btn {
    margin-top: 16px;
    padding: 12px 40px;
    border: 1px solid var(--cyan);
    background: transparent;
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    cursor: pointer;
    pointer-events: all;
    transition: all 0.2s;
    text-shadow: 0 0 10px var(--cyan);
    box-shadow: 0 0 20px rgba(0,245,255,0.2), inset 0 0 20px rgba(0,245,255,0.05);
  }

  .screen-btn:hover {
    background: rgba(0,245,255,0.1);
    box-shadow: 0 0 30px rgba(0,245,255,0.4), inset 0 0 20px rgba(0,245,255,0.1);
  }

  .hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
  }

  .divider {
    width: 100px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--cyan), transparent);
    margin: 4px 0;
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="c" width="400" height="600"></canvas>

  <div id="score-display">0</div>
  <div id="hi-display">BEST: 0</div>
  <div id="diff-display" style="color:rgba(0,245,255,0.4)">LVL 1 · DÉBUTANT</div>

  <div id="screen">
    <div class="screen-sub">// ARCADE v2.077 //</div>
    <div class="screen-title">FLAPPY<br>NEO</div>
    <div class="divider"></div>
    <div class="screen-sub">pilote cyborg en zone hostile</div>
    <button class="screen-btn" id="start-btn">DÉMARRER</button>
    <div class="hint">ESPACE · CLIC · TAP</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 400, H = 600;

let state = 'idle'; // idle | playing | dead
let score = 0, best = 0;
let frame = 0;

// ---- DIFFICULTY SYSTEM ----
// Score thresholds for difficulty levels
const DIFFICULTY_LEVELS = [
  // { minScore, label, color, gravity, jump, pipeGap, pipeSpeed, pipeInterval }
  { minScore:  0, label: 'LVL 1 · DÉBUTANT',   color: 'rgba(0,245,255,0.5)',   gravity: 0.22, jump: -6.0, pipeGap: 210, pipeSpeed: 2.0, pipeInterval: 105 },
  { minScore:  5, label: 'LVL 2 · APPRENTI',   color: 'rgba(100,255,150,0.6)', gravity: 0.26, jump: -6.4, pipeGap: 195, pipeSpeed: 2.2, pipeInterval: 100 },
  { minScore: 10, label: 'LVL 3 · PILOTE',     color: 'rgba(200,255,50,0.6)',  gravity: 0.30, jump: -6.8, pipeGap: 180, pipeSpeed: 2.4, pipeInterval:  97 },
  { minScore: 18, label: 'LVL 4 · VÉTÉRAN',    color: 'rgba(255,200,0,0.7)',   gravity: 0.34, jump: -7.2, pipeGap: 165, pipeSpeed: 2.7, pipeInterval:  93 },
  { minScore: 28, label: 'LVL 5 · ÉLITE',      color: 'rgba(255,120,0,0.7)',   gravity: 0.38, jump: -7.5, pipeGap: 155, pipeSpeed: 3.0, pipeInterval:  90 },
  { minScore: 40, label: 'LVL 6 · DANGER',     color: 'rgba(255,60,60,0.8)',   gravity: 0.42, jump: -7.8, pipeGap: 142, pipeSpeed: 3.3, pipeInterval:  87 },
  { minScore: 55, label: 'LVL 7 · CRITIQUE',   color: 'rgba(255,0,110,0.9)',   gravity: 0.46, jump: -8.1, pipeGap: 130, pipeSpeed: 3.6, pipeInterval:  84 },
  { minScore: 70, label: 'LVL 8 · IMPOSSIBLE', color: 'rgba(255,0,200,1.0)',   gravity: 0.50, jump: -8.4, pipeGap: 120, pipeSpeed: 4.0, pipeInterval:  80 },
];

function getDifficulty() {
  let lvl = DIFFICULTY_LEVELS[0];
  for (const d of DIFFICULTY_LEVELS) {
    if (score >= d.minScore) lvl = d;
  }
  return lvl;
}

// Bird
const bird = { x: 90, y: 250, vy: 0, r: 14 };
const PIPE_W = 52;

let pipes = [];
let pipeTimer = 0;

// Particles
let particles = [];

// Stars
let bgStars = [];
for (let i = 0; i < 60; i++) {
  bgStars.push({ x: Math.random() * W, y: Math.random() * H, s: Math.random() * 1.5 + 0.3, sp: Math.random() * 0.4 + 0.1 });
}

// ---- Helpers ----
function rand(a, b) { return a + Math.random() * (b - a); }

function spawnPipe() {
  const diff = getDifficulty();
  const topH = rand(60, H - diff.pipeGap - 60);
  pipes.push({ x: W + 10, topH, gap: diff.pipeGap });
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(1.5, 5);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: rand(0.02, 0.05),
      r: rand(2, 5),
      color
    });
  }
}

// ---- Drawing ----
function drawBg() {
  ctx.fillStyle = '#020818';
  ctx.fillRect(0, 0, W, H);

  const diff = getDifficulty();
  // Grid color shifts with danger level
  const dangerT = Math.min(score / 70, 1);
  const gridAlpha = 0.05 + dangerT * 0.04;
  ctx.strokeStyle = `rgba(0,245,255,${gridAlpha})`;
  ctx.lineWidth = 0.5;
  const gs = 40;
  for (let x = (frame * 0.5) % gs; x < W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  const pSpeed = getDifficulty().pipeSpeed;
  for (let y = (frame * pSpeed * 0.08) % gs; y < H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  bgStars.forEach(s => {
    s.x -= s.sp;
    if (s.x < 0) { s.x = W; s.y = Math.random() * H; }
    ctx.fillStyle = `rgba(255,255,255,${0.3 + s.s * 0.3})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.s * 0.6, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.strokeStyle = 'rgba(0,245,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H - 60); ctx.lineTo(W, H - 60); ctx.stroke();

  ctx.strokeStyle = 'rgba(255,0,110,0.12)';
  for (let x = 0; x < W; x += 30) {
    ctx.beginPath();
    ctx.moveTo(x, H - 60);
    ctx.lineTo(W / 2, H + 80);
    ctx.stroke();
  }
}

function drawPipe(p) {
  const topGrad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  topGrad.addColorStop(0, '#0a1a3a');
  topGrad.addColorStop(0.4, '#0d2550');
  topGrad.addColorStop(1, '#050e20');
  ctx.fillStyle = topGrad;
  ctx.fillRect(p.x, 0, PIPE_W, p.topH);

  const capH = 18;
  ctx.fillStyle = '#0d3060';
  ctx.fillRect(p.x - 5, p.topH - capH, PIPE_W + 10, capH);

  ctx.strokeStyle = 'rgba(0,245,255,0.6)';
  ctx.lineWidth = 1;
  ctx.strokeRect(p.x, 0, PIPE_W, p.topH);
  ctx.strokeRect(p.x - 5, p.topH - capH, PIPE_W + 10, capH);

  ctx.strokeStyle = 'rgba(0,245,255,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(p.x + PIPE_W / 2, 0); ctx.lineTo(p.x + PIPE_W / 2, p.topH - capH); ctx.stroke();

  const botY = p.topH + p.gap;
  ctx.fillStyle = topGrad;
  ctx.fillRect(p.x, botY, PIPE_W, H - botY);
  ctx.fillStyle = '#0d3060';
  ctx.fillRect(p.x - 5, botY, PIPE_W + 10, capH);

  ctx.strokeStyle = 'rgba(0,245,255,0.6)';
  ctx.lineWidth = 1;
  ctx.strokeRect(p.x, botY, PIPE_W, H - botY);
  ctx.strokeRect(p.x - 5, botY, PIPE_W + 10, capH);

  ctx.strokeStyle = 'rgba(0,245,255,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(p.x + PIPE_W / 2, botY + capH); ctx.lineTo(p.x + PIPE_W / 2, H); ctx.stroke();

  // Gap danger glow — gets redder as difficulty increases
  const dangerT = Math.min(score / 55, 1);
  const r1 = Math.round(255 * dangerT);
  const g1 = Math.round(100 * (1 - dangerT));
  const gap = ctx.createLinearGradient(p.x, p.topH, p.x, botY);
  gap.addColorStop(0,   `rgba(${r1},${g1},110,0.10)`);
  gap.addColorStop(0.5, `rgba(${r1},${g1},110,0)`);
  gap.addColorStop(1,   `rgba(${r1},${g1},110,0.10)`);
  ctx.fillStyle = gap;
  ctx.fillRect(p.x, p.topH, PIPE_W, p.gap);
}

function drawBird() {
  const bx = bird.x, by = bird.y;
  const tilt = Math.min(Math.max(bird.vy * 3.5, -40), 70) * Math.PI / 180;

  ctx.save();
  ctx.translate(bx, by);
  ctx.rotate(tilt);

  const trailGrad = ctx.createRadialGradient(-18, 0, 0, -18, 0, 22);
  trailGrad.addColorStop(0, 'rgba(255,100,0,0.5)');
  trailGrad.addColorStop(1, 'rgba(255,100,0,0)');
  ctx.fillStyle = trailGrad;
  ctx.fillRect(-40, -15, 28, 30);

  const bGlow = ctx.createRadialGradient(0, 0, 2, 0, 0, 22);
  bGlow.addColorStop(0, 'rgba(0,245,255,0.35)');
  bGlow.addColorStop(1, 'rgba(0,245,255,0)');
  ctx.fillStyle = bGlow;
  ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#0a2244';
  ctx.strokeStyle = '#00f5ff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(0, 0, 16, 10, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  const cockpitGrad = ctx.createRadialGradient(3, -3, 0, 3, -3, 9);
  cockpitGrad.addColorStop(0, 'rgba(0,245,255,0.9)');
  cockpitGrad.addColorStop(0.6, 'rgba(0,150,200,0.5)');
  cockpitGrad.addColorStop(1, 'rgba(0,50,100,0.6)');
  ctx.fillStyle = cockpitGrad;
  ctx.strokeStyle = 'rgba(0,245,255,0.8)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(3, -2, 7, 6, -0.3, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#062040';
  ctx.strokeStyle = 'rgba(0,245,255,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-4, -9); ctx.lineTo(8, -14); ctx.lineTo(12, -8); ctx.lineTo(-4, -7);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(-4, 9); ctx.lineTo(8, 14); ctx.lineTo(12, 8); ctx.lineTo(-4, 7);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  ctx.strokeStyle = `rgba(255,${100 + Math.sin(frame * 0.4) * 80},0,0.9)`;
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-16, -3); ctx.lineTo(-22 - Math.random() * 6, 0); ctx.stroke();
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = `rgba(255,200,50,0.6)`;
  ctx.beginPath(); ctx.moveTo(-14, 0); ctx.lineTo(-20 - Math.random() * 8, 2); ctx.stroke();

  ctx.fillStyle = '#00f5ff';
  ctx.beginPath(); ctx.moveTo(16, 0); ctx.lineTo(24, -2); ctx.lineTo(24, 2); ctx.closePath(); ctx.fill();

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawHUD() {
  for (let y = 0; y < H; y += 3) {
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(0, y, W, 1);
  }

  const c = 'rgba(0,245,255,0.4)';
  ctx.strokeStyle = c; ctx.lineWidth = 1.5;
  const cs = 20;
  ctx.beginPath(); ctx.moveTo(0, cs); ctx.lineTo(0, 0); ctx.lineTo(cs, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W - cs, 0); ctx.lineTo(W, 0); ctx.lineTo(W, cs); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, H - cs); ctx.lineTo(0, H); ctx.lineTo(cs, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W - cs, H); ctx.lineTo(W, H); ctx.lineTo(W, H - cs); ctx.stroke();
}

// ---- Difficulty UI ----
let lastDiffLabel = '';
function updateDiffDisplay() {
  const diff = getDifficulty();
  const el = document.getElementById('diff-display');
  if (diff.label !== lastDiffLabel) {
    lastDiffLabel = diff.label;
    el.style.color = diff.color;
    el.textContent = diff.label;
    // Flash effect on level up
    el.style.textShadow = `0 0 12px ${diff.color}`;
    setTimeout(() => { el.style.textShadow = 'none'; }, 600);
  }
}

// ---- Physics ----
function checkCollision() {
  const bx = bird.x, by = bird.y, br = bird.r + 2;
  if (by - br <= 0 || by + br >= H - 60) return true;
  for (const p of pipes) {
    const inX = bx + br > p.x && bx - br < p.x + PIPE_W;
    if (inX) {
      if (by - br < p.topH || by + br > p.topH + p.gap) return true;
    }
  }
  return false;
}

function jump() {
  if (state === 'idle') { startGame(); return; }
  if (state === 'dead') return;
  const diff = getDifficulty();
  bird.vy = diff.jump;
  spawnParticles(bird.x - 10, bird.y, '#00f5ff', 6);
}

function startGame() {
  state = 'playing';
  score = 0;
  pipes = [];
  pipeTimer = 0;
  bird.y = 250; bird.vy = 0;
  particles = [];
  lastDiffLabel = '';
  document.getElementById('score-display').textContent = '0';
  document.getElementById('diff-display').textContent = 'LVL 1 · DÉBUTANT';
  document.getElementById('diff-display').style.color = 'rgba(0,245,255,0.4)';
  document.getElementById('screen').classList.add('hidden');
}

function endGame() {
  state = 'dead';
  spawnParticles(bird.x, bird.y, '#ff006e', 25);
  spawnParticles(bird.x, bird.y, '#ffdd00', 18);
  spawnParticles(bird.x, bird.y, '#00f5ff', 12);

  if (score > best) best = score;
  document.getElementById('hi-display').textContent = 'BEST: ' + best;

  const screen = document.getElementById('screen');
  screen.innerHTML = `
    <div class="screen-sub">// SYSTÈME DÉTRUIT //</div>
    <div class="screen-title" style="font-size:28px">GAME<br>OVER</div>
    <div class="divider"></div>
    <div class="screen-sub">SCORE</div>
    <div class="screen-score">${score}</div>
    <div class="screen-sub">MEILLEUR : ${best}</div>
    <button class="screen-btn" id="start-btn">REJOUER</button>
    <div class="hint">ESPACE · CLIC · TAP</div>
  `;
  screen.classList.remove('hidden');
  document.getElementById('start-btn').addEventListener('click', startGame);
}

// ---- Loop ----
function loop() {
  frame++;
  drawBg();

  const diff = getDifficulty();

  if (state === 'playing') {
    // Dynamic gravity from difficulty
    bird.vy += diff.gravity;
    bird.y += bird.vy;

    // Pipes with dynamic speed & interval
    pipeTimer++;
    if (pipeTimer >= diff.pipeInterval) { spawnPipe(); pipeTimer = 0; }

    pipes.forEach(p => {
      p.x -= diff.pipeSpeed;
      if (!p.scored && p.x + PIPE_W < bird.x) {
        p.scored = true;
        score++;
        document.getElementById('score-display').textContent = score;
        spawnParticles(bird.x, bird.y - 20, '#ffdd00', 8);
        updateDiffDisplay();
      }
    });
    pipes = pipes.filter(p => p.x + PIPE_W + 10 > 0);

    if (checkCollision()) endGame();
  }

  if (state === 'idle') {
    bird.y = 250 + Math.sin(frame * 0.04) * 18;
  }

  pipes.forEach(drawPipe);

  // Ground
  ctx.fillStyle = '#040f28';
  ctx.fillRect(0, H - 60, W, 60);
  ctx.strokeStyle = 'rgba(255,0,110,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H - 60); ctx.lineTo(W, H - 60); ctx.stroke();

  ctx.strokeStyle = 'rgba(255,0,110,0.15)';
  ctx.lineWidth = 0.5;
  for (let x = (W - (frame * diff.pipeSpeed) % 40); x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, H - 60); ctx.lineTo(x, H); ctx.stroke();
  }

  if (state !== 'dead') drawBird();

  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);
  drawParticles();

  drawHUD();
  requestAnimationFrame(loop);
}

// ---- Controls ----
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); jump(); }
});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });
document.getElementById('start-btn').addEventListener('click', startGame);

loop();
</script>
</body>
</html>
